spec_id: journey_client_mob_aggro_and_control_system_v83
spec_version: 1
generated_on: 2026-04-07
repository: maplestory-wasm
scope:
  purpose: >
    Source-derived specification of mob aggro and controller assignment as
    understood by this client, including what is client-side, what is only
    server-communicated, and what is not implemented in this codebase.
  relation_to_other_docs:
    - docs/player-attack-system-v83.yaml
    - docs/mob-knockback-system-v83.yaml

high_level_answer:
  explicit_aggro_target_packet_handled_by_client: false
  client_side_target_selection_ai: false
  primary_runtime_concept: mob_controller_assignment
  summary: >
    This client does not implement mob AI aggro targeting on its own and does
    not handle a dedicated inbound "mob is now aggroed to player X" packet.
    The meaningful runtime concept in this codebase is monster controller
    assignment from the server. The server can assign control in mode 1
    (normal) or mode 2 (aggro), and this client stores that mode as control
    plus an aggro boolean, but the aggro boolean is not used anywhere else.

primary_sources:
  - path: src/client/Gameplay/MapleMap/Mob.h
    symbols: [Mob::set_control documentation, Mob::aggro field]
  - path: src/client/Gameplay/MapleMap/Mob.cpp
    symbols: [Mob::set_control, Mob::send_movement]
  - path: src/client/Net/Handlers/MapObjectHandlers.cpp
    symbols: [SpawnMobHandler, SpawnMobControllerHandler, MobMovedHandler]
  - path: src/client/Net/PacketSwitch.cpp
    symbols: [SPAWN_MOB_C, MOVE_MOB_RESPONSE]
  - path: docs/ms-network-protocol.md
    sections:
      - "0x00BD AUTO_AGGRO"
      - "0x00EE SPAWN_MONSTER_CONTROL"
      - "0x00F0 MOVE_MONSTER_RESPONSE"

server_packets_and_expectations:
  protocol_doc_claims:
    client_send_auto_aggro:
      opcode_hex: "0x00BD"
      name: AUTO_AGGRO
      documented_purpose: "Client reports that a monster should start attacking the player"
      documented_payload:
        mobOid: int
    server_send_spawn_monster_control:
      opcode_hex: "0x00EE"
      name: SPAWN_MONSTER_CONTROL
      documented_payload:
        mode: "0=remove control, 1=normal, 2=aggro"
        mobOid: int
        extra_when_mode_gt_0: "full monster data"
    server_send_move_monster_response:
      opcode_hex: "0x00F0"
      name: MOVE_MONSTER_RESPONSE
      documented_purpose: "Acknowledges controlling client's movement packet"
  source_code_status_against_protocol_doc:
    AUTO_AGGRO_client_send_implemented: false
    SPAWN_MONSTER_CONTROL_inbound_implemented: true
    MOVE_MONSTER_RESPONSE_inbound_implemented: false

client_implemented_behavior:
  spawn_without_controller:
    packet: SPAWN_MOB
    handler: SpawnMobHandler
    effect:
      - mob is spawned with mode 0
      - Mob::set_control(0) means control = false and aggro = false
  spawn_or_update_with_controller:
    packet: SPAWN_MOB_C
    handler: SpawnMobControllerHandler
    behavior:
      mode_0:
        effect: remove local control from existing mob
      mode_1:
        effect:
          - local control = true
          - local aggro = false
      mode_2:
        effect:
          - local control = true
          - local aggro = true
    note: >
      This is the only place where an aggro-like state is conveyed into the
      client's mob object.
  mob_set_control_semantics:
    source: src/client/Gameplay/MapleMap/Mob.cpp::set_control
    formulas:
      control: "mode > 0"
      aggro: "mode == 2"

aggro_field_usage:
  field_name: Mob::aggro
  assignment_sites:
    - src/client/Gameplay/MapleMap/Mob.cpp::set_control
  read_sites: []
  conclusion: >
    The aggro boolean is dead state in this codebase. It is stored when control
    mode 2 is received, but it is not consumed by rendering, AI, movement,
    attack logic, knockback logic, or packet emission.

controller_vs_aggro_meaning_in_this_client:
  controller:
    meaning: >
      This client instance is responsible for locally simulating and reporting
      the mob's movement state.
    practical_effects:
      - controlled mobs ignore inbound server movement in Mob::send_movement
      - controlled mobs can have locally applied knockback reactions
      - controlled mobs emit MOVE_MONSTER packets from this client when their movement changes locally
  aggro:
    meaning: >
      Only a stored mode bit derived from server mode == 2. No further client
      behavior changes are attached to it in this codebase.
    practical_effects: []

incoming_movement_behavior:
  packet: MOB_MOVED
  handler: MobMovedHandler
  path:
    - parse mob oid
    - parse start position and movement fragments
    - call Stage::get().get_mobs().send_movement(...)
  controlled_mob_rule:
    source: src/client/Gameplay/MapleMap/Mob.cpp::send_movement
    behavior: >
      If control == true, the function returns immediately and does not apply
      the server movement update.
  implication: >
    Server-side control assignment is the effective ownership mechanism. Once
    this client controls a mob, movement and hit reactions become locally owned
    here until control is removed.

outgoing_packets_related_to_aggro_or_control:
  MOVE_MONSTER:
    implemented: true
    purpose_in_codebase: >
      Report movement of a locally controlled mob, including movement caused by
      local knockback handling.
  AUTO_AGGRO:
    implemented: false
    evidence:
      - no out-packet enum for AUTO_AGGRO in src/client/Net/OutPacket.h
      - no packet class for AUTO_AGGRO
      - no call sites that send such a packet
  MOVE_MONSTER_RESPONSE:
    implemented_as_handler: false
    evidence:
      - PacketSwitch maps MOVE_MOB_RESPONSE to NullHandler

what_happens_when_player_hits_a_mob_and_it_becomes_aggroed:
  client_side_answer: >
    This client has no code that decides "the mob is now aggroed to player X"
    from a hit. There is no local aggro target selection and no local packet
    emission for aggro state changes.
  expected_server_side_flow_from_available_evidence: >
    If the server wants this client to become the controller of that mob in an
    aggro state, it should send SPAWN_MOB_C with mode 2. This client will then
    store control=true and aggro=true for that mob.
  limitation: >
    The client will not know which specific player the mob is aggroed to beyond
    the coarse implication that the server gave this client aggro-control mode.

player_specific_targeting_support:
  target_player_id_stored_on_mob: false
  target_player_packet_field_handled: false
  target_player_ui_feedback: false
  conclusion: >
    There is no explicit per-player aggro target model in this client source.

interaction_with_other_players:
  case: server reassigns mob control because another player drew aggro
  expected_client_result:
    - this client should receive SPAWN_MOB_C mode 0 for losing control, or simply stop being controlling depending on server flow
    - another client's instance would receive SPAWN_MOB_C mode 1 or 2
    - this client will then accept inbound MOB_MOVED updates for that mob again
  case: this client receives foreign player attack packets against a mob it controls
  result: >
    Attack replay can still apply local hit effects and knockback because those
    depend on controller ownership, not on attacker identity.
  case: this client receives foreign player attack packets against a mob it does not control
  result: >
    This client can show remote attack visuals and damage effects, but mob
    movement ownership remains elsewhere.

java_port_guidance:
  if_goal_is_1_to_1_with_this_client:
    - implement SPAWN_MOB_C mode handling exactly
    - store aggro flag from mode == 2
    - do not attach extra gameplay semantics to the aggro flag unless you intentionally diverge
    - do not invent a local AUTO_AGGRO sender
    - treat controller ownership as the operative concept for mob-side behavior
  if_goal_is_full_server_compatibility_beyond_this_client:
    - verify whether the original server expects AUTO_AGGRO from retail clients
    - verify exact controller reassignment semantics on aggro transitions
    - verify whether MOVE_MONSTER_RESPONSE carries additional aggro/control synchronization

bottom_line:
  answer: >
    There is no dedicated implemented client-side packet or system here that
    means "this mob is now aggroed to specific player X." The server-facing
    concept present in this client is controller assignment via SPAWN_MOB_C,
    with mode 2 marking aggro-control, but that aggro bit is otherwise unused
    locally.
