spec_id: journey_client_mob_knockback_system_v83
spec_version: 1
generated_on: 2026-04-07
repository: maplestory-wasm
scope:
  purpose: >
    Source-derived specification of how this client handles mob knockback when
    a player attack hit lands.
  relation_to_attack_spec: >
    This document is intentionally separate from docs/player-attack-system-v83.yaml
    for focused lookup and easier access.

high_level_answer:
  exists_in_client: true
  summary: >
    Mob knockback on attack is handled locally by this client. The client
    computes damage locally, checks the mob's knockback threshold from NX data,
    applies a local HIT reaction when the threshold is met, and then sends a
    MOVE_MONSTER packet reflecting the resulting mob movement/state.
  not_encoded_in_attack_packet: true
  server_side_only: false

primary_sources:
  - path: src/client/Gameplay/Combat/Combat.cpp
    symbols: [Combat::extract_effects, Combat::apply_damage_effect]
  - path: src/client/Gameplay/MapleMap/MapMobs.cpp
    symbols: [MapMobs::apply_damage]
  - path: src/client/Gameplay/MapleMap/Mob.cpp
    symbols: [Mob::Mob, Mob::apply_damage, Mob::update, Mob::update_movement, Mob::send_movement]
  - path: src/client/Net/Packets/GameplayPackets.h
    symbols: [MoveMobPacket]
  - path: src/client/Net/Handlers/MapObjectHandlers.cpp
    symbols: [SpawnMobHandler, SpawnMobControllerHandler, MobMovedHandler]

mob_data_source:
  nx_path_template: "Mob/{mobId}.img/info"
  fields_used:
    knockback_threshold: pushed
    touch_damage_enabled: bodyAttack
    physical_attack: PADamage
    magic_attack: MADamage
    speed: speed
    fly_speed: flySpeed

trigger_path:
  call_chain:
    - local player attacks: Combat::apply_move -> extract_effects(...) -> apply_damage_effect(...)
    - foreign player attacks: AttackHandler -> Combat::push_attack -> Combat::apply_attack -> extract_effects(...) -> apply_damage_effect(...)
    - Combat::extract_effects schedules DamageEffect per hit
    - Combat::apply_damage_effect calls MapMobs::apply_damage(...)
    - MapMobs::apply_damage calls Mob::apply_damage(...)
  timing:
    projectile_attacks: knockback is evaluated when the local projectile effect lands
    non_projectile_attacks: knockback is evaluated after the locally scheduled hit delay

knockback_rule:
  predicate: "control && is_alive() && damage >= knockback"
  variables:
    control: "mob is locally controlled; set by Mob::set_control(mode > 0)"
    is_alive: "mob is active and not already dying"
    damage: "integer hit damage from the local damage line"
    knockback: "mob.info.pushed from NX"
  miss_behavior:
    condition: "damage == 0"
    result: no knockback
  below_threshold_behavior:
    condition: "damage < knockback"
    result:
      - play hit sound only
      - do not enter HIT stance
      - do not apply knockback movement
      - do not set awaitdeath

local_reaction_when_knockback_happens:
  immediate_effects:
    - play mob hit sound
    - set mob.flip = toleft
    - set mob.counter = 170
    - set mob stance to HIT
    - dispatch MOVE_MONSTER packet via update_movement()
    - set awaitdeath = true
  source: src/client/Gameplay/MapleMap/Mob.cpp::apply_damage

hit_state_motion:
  source: src/client/Gameplay/MapleMap/Mob.cpp::update
  force_values:
    on_ground: 0.2
    in_air: 0.1
  direction_rule: "if flip then hforce = -KBFORCE else hforce = +KBFORCE"
  duration_rule:
    predicate: "stance == HIT and counter > 200"
    effect: mob chooses next move afterward

death_interaction:
  source: src/client/Gameplay/MapleMap/Mob.cpp::apply_damage
  rule: >
    If the mob is already marked dying and current stance is not DIE,
    apply_death() is executed immediately instead of normal knockback handling.

server_interaction:
  outbound_packet:
    opcode_name: MOVE_MONSTER
    opcode_decimal: 188
    source: src/client/Net/Packets/GameplayPackets.h::MoveMobPacket
  payload_origin:
    source: src/client/Gameplay/MapleMap/Mob.cpp::update_movement
    fields_summary:
      oid: mob object id
      type: 1
      skill_bytes: all 0
      start_position: current mob position
      movement: "single Movement(phobj, value_of(stance, flip))"
  interpretation: >
    The client informs the server after it has already applied the knockback
    decision locally. In this codebase, immediate mob knockback visuals and hit
    state are client-side behavior on the controlling client.

controller_behavior:
  acquisition:
    source: src/client/Net/Handlers/MapObjectHandlers.cpp::SpawnMobControllerHandler
    rules:
      - SPAWN_MOB spawns mobs with mode 0, which means not locally controlled
      - SPAWN_MOB_C with mode 0 removes local control for an existing mob
      - SPAWN_MOB_C with mode > 0 grants local control and may spawn/update the mob under this client's control
  source: src/client/Gameplay/MapleMap/Mob.cpp::send_movement
  rule: >
    If the mob is locally controlled, incoming server movement updates are
    ignored. This means the controlling client owns the active local movement
    state, including knockback reactions.
  inbound_mob_movement_behavior:
    source: src/client/Net/Handlers/MapObjectHandlers.cpp::MobMovedHandler
    effect: >
      Server movement packets are forwarded to Mob::send_movement(...), but
      Mob::send_movement immediately returns when control == true.

attacker_vs_controller_matrix:
  governing_rule: >
    Knockback depends on whether this client controls the mob at the time the
    hit is applied. The attacker identity does not by itself decide knockback.
  cases:
    - case: local_player_attacks_mob_and_this_client_controls_mob
      local_knockback: yes
      reason: "Mob::apply_damage sees control == true"
      local_effects:
        - local hit sound
        - local HIT stance if damage >= pushed
        - local knockback movement
        - outbound MOVE_MONSTER from this client
    - case: local_player_attacks_mob_and_this_client_does_not_control_mob
      local_knockback: no
      reason: "Mob::apply_damage sees control == false"
      local_effects:
        - local damage effects and hit effects can still appear
        - no local HIT stance transition from knockback logic
        - no local knockback movement
        - no local MOVE_MONSTER caused by knockback
    - case: foreign_player_attacks_mob_and_this_client_controls_mob
      local_knockback: yes
      reason: >
        Foreign attacks are replayed locally through Combat::apply_attack, and
        the final Mob::apply_damage check still only cares that control == true.
      local_effects:
        - foreign attack animation/effects are shown
        - local mob hit sound
        - local HIT stance if replayed damage >= pushed
        - local knockback movement
        - outbound MOVE_MONSTER from this client
    - case: foreign_player_attacks_mob_and_this_client_does_not_control_mob
      local_knockback: no
      reason: "Mob::apply_damage sees control == false"
      local_effects:
        - foreign attack animation/effects are shown
        - hit effects can still be shown on the mob
        - no local knockback movement
        - movement must come from whoever controls the mob or from server updates

foreign_attack_replay_notes:
  source: src/client/Gameplay/Combat/Combat.cpp::apply_attack
  behavior: >
    When another player's attack packet is received, this client reconstructs
    the remote attack locally, schedules bullet/damage effects, and eventually
    calls the same mob damage application path used by the local player.
  consequence: >
    A foreign player's hit can cause local knockback here if and only if this
    client currently controls that mob.

important_limitations:
  - knockback threshold uses only the local NX field pushed
  - there is no explicit server confirmation before local knockback is shown
  - there is no explicit boss anti-knockback logic here beyond the threshold test
  - if the mob is not locally controlled, this client will not apply the knockback reaction
  - the attack packet itself carries no knockback flag or knockback value

answer_for_java_port:
  if_goal_is_1_to_1_with_this_client: >
    Implement mob knockback on the client side at hit-application time, gated
    by local mob control and damage >= mob.info.pushed.
  if_goal_is_server_authoritative_design: >
    That would be a behavior change relative to this client, not a 1:1 port.
