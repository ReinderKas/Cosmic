spec_id: journey_client_player_attack_system_v83
spec_version: 1
generated_on: 2026-04-07
repository: maplestory-wasm
scope:
  purpose: >
    Complete source-derived specification of the client-side player attack system
    for the three client->server opcodes 0x2C, 0x2D, and 0x2E, intended for a
    1:1 Java reimplementation of the current client behavior.
  covered_opcodes:
    - name: CLOSE_RANGE_ATTACK
      hex: "0x002C"
      decimal: 44
      client_enum: CLOSE_ATTACK
    - name: RANGED_ATTACK
      hex: "0x002D"
      decimal: 45
      client_enum: RANGED_ATTACK
    - name: MAGIC_ATTACK
      hex: "0x002E"
      decimal: 46
      client_enum: MAGIC_ATTACK
  excluded_from_scope:
    - server-side validation or damage formulas not present in this client
    - non-attack skill packet USE_SKILL(0x005B)
    - mob-to-player damage except where it affects attack-side stat state
  canonical_rule: >
    This document describes the exact behavior implemented by this client
    source tree. Where it conflicts with docs/ms-network-protocol.md, the
    client source is authoritative for a 1:1 reimplementation of this client.

