type_system:
  endian: little
  booleans:
    write_behavior: >
      The packet writer only exposes write_byte(int8_t). Boolean-valued fields
      are serialized by implicit conversion to byte, so false -> 0x00 and
      true -> 0x01.
  attack_type_enum:
    CLOSE: 0
    RANGED: 1
    MAGIC: 2
  damage_type_enum:
    DMG_WEAPON: 0
    DMG_MAGIC: 1
    DMG_FIXED: 2
  stance_enum_values:
    NONE: 0
    ALERT: 1
    DEAD: 2
    FLY: 3
    HEAL: 4
    JUMP: 5
    LADDER: 6
    PRONE: 7
    PRONESTAB: 8
    ROPE: 9
    SHOT: 10
    SHOOT1: 11
    SHOOT2: 12
    SHOOTF: 13
    SIT: 14
    STABO1: 15
    STABO2: 16
    STABOF: 17
    STABT1: 18
    STABT2: 19
    STABTF: 20
    STAND1: 21
    STAND2: 22
    SWINGO1: 23
    SWINGO2: 24
    SWINGO3: 25
    SWINGOF: 26
    SWINGP1: 27
    SWINGP2: 28
    SWINGPF: 29
    SWINGT1: 30
