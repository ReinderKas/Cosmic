attack_type_selection:
  source: src/client/Character/Player.cpp::prepare_attack
  algorithm: |
    if player.state == PRONE:
        attack_type = CLOSE
        degenerate = true
    else:
        switch weapon_type:
            case BOW, CROSSBOW, CLAW, GUN:
                degenerate = !inventory.has_projectile()
                attack_type = CLOSE if degenerate else RANGED
            case WAND, STAFF:
                degenerate = !skill_move_requested
                attack_type = CLOSE if degenerate else MAGIC
            default:
                attack_type = CLOSE
                degenerate = false
  degenerate_effect:
    rule: if degenerate, divide base mindamage and maxdamage by 10 before any skill-specific modification
    affected_cases:
      - prone attack
      - ranged weapon with no projectile
      - wand/staff non-skill basic attack

combat_stat_assembly:
  recomputation_pipeline:
    - Player::recalc_stats() sets current weapon type on CharStats
    - CharStats::init_totalstats() seeds totals from base stats and default combat state
    - Inventory::recalc_stats() adds equipped item stats and active projectile WATK
    - Passive skill effects from PassiveBuffs are applied
    - Active buff effects from ActiveBuffs are applied
    - CharStats::close_totalstats() computes accuracy, percentage-based totals, mindamage, maxdamage
  charstats_defaults_relevant_to_attacks:
    mastery: 0.1
    critical: 0.05
    mincrit: 0.5
    maxcrit: 0.75
    damagepercent: 0.0
    bossdmg: 0.0
    ignoredef: 0.0
    attackspeed: 0
    projectilerange: 400
  relevant_passive_effects:
    angel_blessing:
      nx_fields: {WATK: x, MAGIC: y, ACC: z, AVOID: z}
    weapon_mastery:
      applicable_by_weapon:
        SWORD_MASTERY_FIGHTER: [SWORD_1H, SWORD_2H]
        AXE_MASTERY: [AXE_1H, AXE_2H]
        SWORD_MASTERY_PAGE: [SWORD_1H, SWORD_2H]
        BW_MASTERY: [MACE_1H, MACE_2H]
        SPEAR_MASTERY: [SPEAR]
        PA_MASTERY: [POLEARM]
        BOW_MASTERY: [BOW]
        CROSSBOW_MASTERY: [CROSSBOW]
        CLAW_MASTERY: [CLAW]
        DAGGER_MASTERY: [DAGGER]
        KNUCKLER_MASTERY: [KNUCKLE]
        GUN_MASTERY: [GUN]
        POLEARM_MASTERY_ARAN: [POLEARM]
        HIGH_MASTERY_ARAN: [POLEARM]
      mastery_formula: "0.1 + (level['mastery'] * 0.05)"
      bonus_accuracy_field: x
    achilles:
      reducedamage_formula: "level['x'] / 1000.0"
    berserk:
      activation_condition: "current_hp <= total_hp * (level['x'] / 100.0)"
      damagepercent_formula: "level['damage'] / 100.0"
  relevant_active_effects:
    MAPLE_WARRIOR:
      applies_percent_to: [STR, DEX, INT, LUK]
    STANCE:
      formula: "stance = value / 100.0"
    BOOSTER:
      formula: "attackspeed = int8(value)"
    WATK: "add to Equipstat::WATK"
    WDEF: "add to Equipstat::WDEF"
    MATK: "add to Equipstat::MAGIC"
    MDEF: "add to Equipstat::MDEF"
    SPEED: "add to Equipstat::SPEED"
    JUMP: "add to Equipstat::JUMP"
    HYPERBODYHP: "add percent to Equipstat::HP"
    HYPERBODYMP: "add percent to Equipstat::MP"
  primary_secondary_stat_selection:
    source: src/client/Character/Job.cpp
    primary:
      magician_jobs: INT
      archer_jobs: DEX
      thief_jobs: LUK
      pirate_jobs: "DEX for GUN, otherwise STR"
      default: STR
    secondary:
      magician_jobs: LUK
      archer_jobs: STR
      thief_jobs: DEX
      pirate_jobs: "STR for GUN, otherwise DEX"
      default: DEX
    thief_special_case:
      condition: "job family == thief and weapon in {CLAW, DAGGER}"
      formula: "secondary = DEX + STR"
  weapon_multiplier_by_type:
    SWORD_1H: 4.0
    AXE_1H: 4.4
    MACE_1H: 4.4
    WAND: 4.4
    STAFF: 4.4
    DAGGER: 3.6
    CROSSBOW: 3.6
    CLAW: 3.6
    GUN: 3.6
    SWORD_2H: 4.6
    AXE_2H: 4.8
    MACE_2H: 4.8
    KNUCKLE: 4.8
    SPEAR: 5.0
    POLEARM: 5.0
    BOW: 3.4
  max_min_damage_formula:
    primary: "get_multiplier() * total(primary_stat)"
    secondary: "total(secondary_stat)"
    attack: "total(WATK)"
    multiplier: "damagepercent + attack / 100.0"
    maxdamage: "int((primary + secondary) * multiplier)"
    mindamage: "int(((primary * 0.9 * mastery) + secondary) * multiplier)"
  accuracy_formula:
    expression: "int(total(DEX) * 0.8 + total(LUK) * 0.5)"
  projectile_range_formula:
    rectangle: {left: -400, right: -5, top: -50, bottom: 50}
    note: this is the default CharStats attack rectangle before skill overrides

inventory_projectile_selection:
  source: src/client/Character/Inventory/Inventory.cpp::recalc_stats
  weapon_to_prefix:
    BOW: 2060
    CROSSBOW: 2061
    CLAW: 2070
    GUN: 2330
  slot_selection_rule: >
    Scan the USE inventory in ascending slot order and choose the first slot
    whose item_id / 1000 equals the required prefix. If no such slot exists,
    bulletslot becomes 0.
  selected_projectile_fields:
    bulletslot: selected USE inventory slot or 0
    bulletcount: count stored in that slot
    bulletid: item_id stored in that slot
  projectile_watk_bonus:
    source: BulletData::get(bulletid).get_watk()
    nx_path: "Item/Consume/0{itemId/10000}.img/0{itemId}/info/incPAD"

attack_object_population:
  source: src/client/Character/Player.cpp::prepare_attack
  fields:
    type:
      source: attack_type_selection result
    damagetype:
      initial_value: DMG_WEAPON
    mindamage:
      source: CharStats::get_mindamage()
      degenerate_rule: "divide by 10 if degenerate"
    maxdamage:
      source: CharStats::get_maxdamage()
      degenerate_rule: "divide by 10 if degenerate"
    critical:
      source: CharStats::get_critical()
    ignoredef:
      source: CharStats::get_ignoredef()
    accuracy:
      source: total Equipstat::ACC
    playerlevel:
      source: base Maplestat::LEVEL
    range:
      source: CharStats::get_range()
    bullet:
      source: Inventory::get_bulletid()
    origin:
      source: player current map position
    toleft:
      source: "!player.flip"
    speed:
      source: "uint8_t(Player::get_integer_attackspeed())"
  notes:
    - attack.display is never assigned anywhere in local attack generation and remains 0
    - attack.charge is never assigned anywhere in local attack generation and remains 0
    - attack.level is not populated for local attacks; it exists only on inbound foreign-attack parsing

special_move_stat_overrides:
  regular_attack:
    source: src/client/Gameplay/Combat/RegularAttack.cpp::apply_stats
    effects:
      skill: 0
      damagetype: DMG_WEAPON
      mobcount: 1
      hitcount: 1
      stance: current CharLook stance
      close_range_override:
        condition: "attack.type == CLOSE"
        value_source: Char::afterimage.range
  skill_attack:
    source: src/client/Gameplay/Combat/Skill.cpp::apply_stats
    per_level_stats_source:
      path_template: "Skill/{skillRoot}.img/skill/{skillId}/level/{skillLevel}"
      parsed_fields:
        damage: "damage / 100.0"
        matk: mad
        fixdamage: fixdamage
        mastery: mastery
        attackcount: attackCount default 1
        mobcount: mobCount default 1
        bulletcount: bulletCount default 1
        bulletcost: bulletConsume default bulletCount
        hpcost: hpCon
        mpcost: mpCon
        chance: "prop / 100.0, default 1.0"
        critical: "hardcoded 0.0 in current parser"
        ignoredef: "hardcoded 0.0 in current parser"
        hrange: "range / 100.0, default 1.0"
        range: "Rectangle<int16_t> parsed from node itself"
    effects:
      skill: skill id
      fixdamage_case:
        condition: "fixdamage != 0"
        result:
          fixdamage: "stats.fixdamage"
          damagetype: DMG_FIXED
      matk_case:
        condition: "fixdamage == 0 and matk != 0"
        result:
          matk_added_to_attack: true
          damagetype: DMG_MAGIC
          note: >
            The current local damage code does not consume attack.matk later,
            so this changes damage type but does not directly change
            mindamage/maxdamage.
      normal_weapon_case:
        condition: "fixdamage == 0 and matk == 0"
        result:
          mindamage: "mindamage *= stats.damage"
          maxdamage: "maxdamage *= stats.damage"
          damagetype: DMG_WEAPON
      critical_addition: "attack.critical += stats.critical"
      ignoredef_addition: "attack.ignoredef += stats.ignoredef"
      mobcount: stats.mobcount
      hrange: stats.hrange
      hitcount:
        ranged: stats.bulletcount
        close_or_magic: stats.attackcount
      range_override:
        condition: "stats.range is not empty"
        value: stats.range
      projectile_override:
        condition: "skill constructor classified the skill as projectile and attack.bullet == 0"
        values:
          THREE_SNAILS_level_1: 4000019
          THREE_SNAILS_level_2: 4000000
          THREE_SNAILS_level_3: 4000016
          default: skill id
      overregular_behavior:
        condition: "skill has no explicit action nodes but is flagged as attack"
        effects:
          stance: current CharLook stance
          close_non_projectile_range_override: Char::afterimage.range

targeting_and_damage_generation:
  source_chain:
    - Combat::apply_move
    - MapMobs::send_attack
    - Mob::calculate_damage
  target_rectangle_build:
    inputs:
      origin: attack.origin
      base_range: attack.range
      hrange_scale: attack.hrange
      toleft: attack.toleft
    algorithm: |
      hrange_pixels = int16(base_range.left * attack.hrange)
      if attack.toleft:
          effective = {
              left: origin.x + hrange_pixels,
              right: origin.x + base_range.right,
              top: origin.y + base_range.top,
              bottom: origin.y + base_range.bottom
          }
      else:
          effective = {
              left: origin.x - base_range.right,
              right: origin.x - hrange_pixels,
              top: origin.y + base_range.top,
              bottom: origin.y + base_range.bottom
          }
  target_selection:
    eligible_mobs:
      - mob must exist
      - mob must be alive
      - mob bounds must overlap effective rectangle
    ordering: ascending Euclidean distance from mob body position to attack.origin
    cap: choose up to requested attack.mobcount
  result_mobcount_behavior:
    note: >
      The serialized mob-count nibble is the number of targets actually found,
      not the requested cap. If fewer mobs are inside range, the high nibble is lower.
  local_damage_formula:
    mob_stats_source:
      nx_path_template: "Mob/{mobId}.img/info"
      fields_used:
        level: level
        physical_defense: PDDamage
        magic_defense: MDDamage
        avoid: eva
    leveldelta: "max(mob.level - attack.playerlevel, 0)"
    weapon_magic_damage_case:
      mindamage:
        weapon: "max(1.0, attack.mindamage * (1 - 0.01 * leveldelta) - mob.wdef * 0.6)"
        magic: "max(1.0, attack.mindamage - (1 + 0.01 * leveldelta) * mob.mdef * 0.6)"
      maxdamage:
        weapon: "max(1.0, attack.maxdamage * (1 - 0.01 * leveldelta) - mob.wdef * 0.5)"
        magic: "max(1.0, attack.maxdamage - (1 + 0.01 * leveldelta) * mob.mdef * 0.5)"
      hitchance: "max(0.01, attack.accuracy / (((1.84 + 0.07 * leveldelta) * mob.avoid) + 1.0))"
      critical_chance: attack.critical
    fixed_damage_case:
      mindamage: attack.fixdamage
      maxdamage: attack.fixdamage
      hitchance: 1.0
      critical_chance: 0.0
    per_hit_roll:
      miss_rule: "if random() is above hitchance, emit damage 0 and critical false"
      hit_rule:
        base_roll: uniform real in [mindamage, maxdamage]
        critical_multiplier: 1.5 when critical proc succeeds
        floor_to_int: true
        clamp: [1, 999999]
    critical_serialization: >
      Critical is tracked in the local vector<pair<int32_t,bool>> for damage-number
      coloring and hit effects, but only the integer damage is written into the attack packet.
  fields_not_used_by_local_damage:
    - attack.ignoredef is computed but never consumed
    - attack.matk is computed for magic skills but never consumed directly
    - SkillData.stats.chance is parsed but not used by this attack path

packet_construction:
  writer:
    class: AttackPacket
    constructor_input: AttackResult
    opcode_selection:
      CLOSE: 44
      RANGED: 45
      MAGIC: 46
  critical_rule: >
    The exact outbound body must be copied from AttackPacket, not from the
    protocol markdown. This client does not write a skill-level byte, does
    not write a projectile int field, and writes several fixed zero spans.
  body_layout_after_opcode:
    shared_prefix:
      - name: reserved_0
        size: 1
        value: 0
        source: skip(1)
      - name: packed_counts
        size: 1
        value_formula: "(result.mobcount << 4) | result.hitcount"
        subfields:
          high_nibble_actual_target_count: 0-15
          low_nibble_hit_count: 0-15
      - name: skill_id
        size: 4
        value_source: result.skill
        notes:
          - regular attack writes 0
          - unlike the protocol doc, there is no preceding skill-level byte
      - name: optional_charge
        size: 4
        emitted_when: "result.charge > 0"
        value_source: result.charge
        current_client_state: never emitted by stock client because no assignment sites exist
      - name: reserved_1
        size: 8
        value: 0
        source: skip(8)
      - name: display
        size: 1
        value_source: result.display
        current_client_state: always 0
      - name: direction
        size: 1
        value_source: result.toleft
        raw_values: [0, 1]
      - name: stance
        size: 1
        value_source: result.stance
        raw_values:
          current_regular_or_overregular: "0 or any value from stance_enum_values"
          current_non_overregular_skill: 0
      - name: reserved_2
        size: 1
        value: 0
        source: skip(1)
      - name: speed
        size: 1
        value_source: result.speed
        formula: "uint8_t(stats.attackspeed + weapon.attackSpeed)"
        notes:
          - no clamping is performed
          - typical inputs are non-negative small integers
    close_and_magic_suffix:
      - name: reserved_3
        size: 4
        value: 0
        source: skip(4)
    ranged_suffix:
      - name: reserved_3a
        size: 1
        value: 0
        source: skip(1)
      - name: repeated_direction
        size: 1
        value_source: result.toleft
        raw_values: [0, 1]
      - name: reserved_3b
        size: 7
        value: 0
        source: skip(7)
      - name: unsupported_special_case_comment
        size: 0
        note: "A source comment mentions another 4 skipped bytes for Hurricane, Piercing Arrow, or Rapid Fire, but this is not implemented."
    per_target_entry:
      ordered_by: iteration order of result.damagelines
      note: >
        result.damagelines is an unordered_map, so the packet target order is
        not stable by definition once targets have been inserted. Target
        selection itself is distance-sorted, but serialization order is then
        subject to unordered_map bucket ordering.
      fields:
        - name: mob_oid
          size: 4
          value_source: target oid key
        - name: reserved_target_header
          size: 14
          value: 0
          source: skip(14)
        - name: damages
          repeated: true
          element_size: 4
          count_source: "vector length stored in result.damagelines[mob_oid]"
          value_source: damage integer only
        - name: reserved_target_tail
          size: 4
          emitted_when: "result.skill != 5221004"
          value: 0
          source: skip(4)
          notes:
            - 5221004 is Corsair Rapid Fire
            - the code special-cases this skill only here
  packet_size_formulas:
    close_or_magic_payload_size: >
      1 + 1 + 4 + (charge>0 ? 4 : 0) + 8 + 1 + 1 + 1 + 1 + 4 +
      sum_per_target(4 + 14 + 4*damage_count + (skill != 5221004 ? 4 : 0))
    ranged_payload_size: >
      1 + 1 + 4 + (charge>0 ? 4 : 0) + 8 + 1 + 1 + 1 + 1 + 1 + 1 + 7 +
      sum_per_target(4 + 14 + 4*damage_count + (skill != 5221004 ? 4 : 0))
  field_value_summary:
    reserved_fields: always 0
    packed_counts:
      high_nibble: actual target count actually damaged locally
      low_nibble: attack.hitcount after skill/regular stat application
    skill_id:
      regular: 0
      skill: move id
    charge:
      current_client: absent
    display:
      current_client: 0
    direction:
      source_variable: toleft
      encoding: false=0, true=1
    stance:
      regular_attack: current CharLook stance
      overregular_skill_attack: current CharLook stance
      most explicit-action skill attacks: 0
    speed:
      source: stats.attackspeed + weapon.attackSpeed
    projectile_item_id:
      current_client_packet: not serialized at all
    damage_values:
      legal_runtime_range: 0..999999
      miss_value: 0
      negative_values: never emitted by this client

known_protocol_divergences:
  against_docs_ms_network_protocol_md:
    - issue: The markdown describes a client timestamp field before packed counts.
      current_client_behavior: Only one zero byte is written.
    - issue: The markdown describes a constant 0x5B byte after packed counts.
      current_client_behavior: The next field is a 4-byte skill id.
    - issue: The markdown describes a skillLevel byte before skillId.
      current_client_behavior: No skill-level byte is written.
    - issue: The markdown describes a projectile int field.
      current_client_behavior: No projectile int field is written for any attack type.
    - issue: The markdown describes a 0x0A constant before projectile.
      current_client_behavior: The client writes a reserved zero byte before speed, then type-specific zero padding.
    - issue: The markdown describes per-target byte 0 then damage lines.
      current_client_behavior: The client writes 14 zero bytes before damage lines.
    - issue: The markdown describes an appended int(0) for ranged attacks.
      current_client_behavior: The client writes 1 zero byte, the direction byte again, and 7 more zero bytes before target data.
    - issue: The markdown describes an optional charge int for magic attacks.
      current_client_behavior: A charge field exists in AttackPacket but is never populated by this client.
  against_inbound_foreign_attack_format:
    - issue: AttackHandler expects broadcast packets with skill level and projectile fields.
      meaning: "Outbound local attack packets and inbound foreign-attack packets are not mirror images in this client."

visual_and_timing_data_sources:
  regular_attack_animation_selection:
    source_chain:
      - WeaponData::get(weapon_id).get_attack()
      - CharLook::getattackstance(attackType, degenerate)
    weapon_attack_type_to_possible_stances:
      normal:
        1: [STABO1, STABO2, SWINGO1, SWINGO2, SWINGO3]
        2: [STABT1, SWINGP1]
        3: [SHOOT1]
        4: [SHOOT2]
        5: [STABO1, STABO2, SWINGT1, SWINGT2, SWINGT3]
        6: [SWINGO1, SWINGO2]
        7: [SWINGO1, SWINGO2]
        9: [SHOT]
      degenerate:
        3: [SWINGT1, SWINGT3]
        4: [SWINGT1, STABT1]
        7: [SWINGT1, STABT1]
        9: [SWINGP1, STABT2]
      prone_override: PRONESTAB
  skill_action_selection:
    source: src/client/Gameplay/Combat/Skill.cpp
    selection_order:
      - if skill/action/0 and skill/action/1 both exist -> two-handed action by weapon handedness
      - else if skill/action/0 exists -> single action string
      - else if skill is flagged attack and level/{n}/action exists -> by-skill-level action
      - else if skill is flagged attack -> regular weapon action fallback (overregular = true)
      - else -> no action
    nx_paths:
      root: "Skill/{skillRoot}.img/skill/{skillId}"
      explicit_actions:
        single: action/0
        two_handed: [action/0, action/1]
        by_level: level/{skillLevel}/action
  action_frame_timing:
    source_chain:
      - BodyDrawinfo::init()
      - CharLook::get_attackdelay()
      - Char::get_attackdelay()
    nx_source:
      body_root: "Character/00002000.img"
    extraction_rule:
      description: >
        For action-style animations, each frame node contains an action string,
        frame number, move point, and delay. Positive delay marks an attack
        frame and contributes a timestamp to attack_delays[actionName]. Negative
        delay marks a non-attack transition frame and contributes time but not
        an attack timestamp.
      stored_value: cumulative elapsed delay before each positive-delay action frame
    final_runtime_formula:
      integer_attack_delay: "BodyDrawinfo.attack_delays[actionName][i] or 0 if missing"
      attack_speed_multiplier: "1.7 - (integer_attack_speed / 10.0)"
      returned_delay_ms_like_ticks: "uint16(integer_attack_delay / attack_speed_multiplier)"
  non_action_afterimage_timing:
    source_chain:
      - Char::set_afterimage()
      - Afterimage::Afterimage()
      - CharLook::get_attackdelay(no, firstFrame)
    nx_paths:
      skill_specific_afterimage: "Skill/{skillRoot}.img/skill/{skillId}/afterimage/{afterImageName}/{stanceName}"
      fallback_afterimage: "Character/Afterimage/{afterImageName}.img/{reqLevel/10}/{stanceName}"
    first_frame_rule: "The first numeric child frame in the afterimage node becomes firstframe."
    close_range_hit_timing_without_action: >
      Sum stance frame delays from frame 0 up to, but not including, the
      afterimage first frame, then divide by real attack speed.
  use_effect_lookup:
    source: src/client/Gameplay/Combat/Skill.cpp
    selection_order:
      - CharLevel/{charLevel}/effect if present
      - effect0/effect1/effect... multi-effect if effect0 exists
      - effect animation if effect/0 is a bitmap
      - effect/0 and effect/1 two-handed pair if effect/1 exists
      - special hardcoded Iron Body / Magic Armor effect
      - otherwise no use effect
  hit_effect_lookup:
    selection_order:
      - CharLevel/{charLevel}/hit with 0 and 1 variants if present
      - CharLevel/{charLevel}/hit/0 if present
      - level/{skillLevel}/hit/0 if present
      - hit/0 and hit/1 two-handed pair if present
      - hit/0 if present
      - otherwise no hit effect
  projectile_animation_lookup:
    regular_projectile:
      nx_path: "Item/Consume/0{itemId/10000}.img/0{itemId}/bullet"
    skill_projectile:
      selection_order:
        - level/{skillLevel}/ball
        - ball
        - fallback to regular projectile if skill constructor classified the skill as non-projectile = false
    stock_client_note: >
      Projectile visuals are used locally even though the outbound packet does
      not serialize projectile item ids.
  sound_lookup:
    weapon_use_sound:
      nx_path: "Sound/Weapon.img/{weapon.info.sfx}/Attack"
      alternate_two_sound_path: "Sound/Weapon.img/{weapon.info.sfx}/Attack2"
    skill_use_and_hit_sound:
      nx_path: "Sound/Skill.img/{skillId}/Use and Sound/Skill.img/{skillId}/Hit"

local_visual_effect_timing_after_attack_result:
  source: Combat::extract_effects
  projectile_attacks:
    per_hit_delay: >
      user.get_attackdelay(index). If index > 0 and returned delay is 0,
      fallback to user.get_attackdelay(0) + index * 45.
    bullet_spawn_offset:
      x: "+30 if toleft is false, -30 if toleft is true"
      y: "-26"
    bullet_target_stagger:
      formula: "target + (0, index*12 - ((count-1)*6))"
  non_projectile_attacks:
    per_hit_delay: user.get_attackdelay(index)
  damage_number_vertical_stacking:
    rule: subtract DamageNumber::rowheight(critical) for each successive line

field_reimplementation_rules:
  exact_runtime_values_for_current_stock_client:
    result_level:
      value: 0
      reason: local attack generation never sets AttackResult.level
    result_display:
      value: 0
      reason: local attack generation never sets AttackResult.display
    result_charge:
      value: 0
      reason: local attack generation never sets AttackResult.charge
    serialized_projectile_field:
      value: not present
      reason: AttackPacket never writes one
  unordered_map_warning:
    object: AttackResult.damagelines
    effect: >
      A faithful reimplementation must preserve the fact that serialization
      order is not guaranteed by source logic. If deterministic output is
      desired, it would no longer be a 1:1 port.
  no_hidden_normalization:
    - attack speed byte is not clamped
    - mob count and hit count are not range-checked beyond their 4-bit packing
    - missing or zero NX delay values fall back to 100 in BodyAction/stance frames
    - missing extra hit timing for multi-projectile skills falls back to +45 tick spacing

java_port_checklist:
  must_match_exactly:
    - hardcoded attack-skill id table in SkillData::flags_of
    - attack type selection and degenerate rules from Player::prepare_attack
    - CharStats min/max damage formulas and defaults
    - projectile inventory slot selection by USE inventory order
    - skill stat parsing defaults, including hardcoded critical=0 and ignoredef=0
    - target rectangle mirroring and hrange multiplication
    - local damage RNG flow and clamps
    - AttackPacket byte layout, including zero padding and omitted fields
    - action timing extraction from Character/00002000.img positive-delay action frames
    - afterimage fallback path and first-frame timing logic
    - unordered-map serialization behavior if true 1:1 parity is required
  should_not_assume:
    - protocol markdown is correct for these packets
    - inbound foreign-attack format matches outbound local-attack format
    - projectile item ids are serialized
    - skill level is serialized in local attack packets
    - magic attack local damage uses attack.matk directly

open_issues_in_stock_client:
  - id: no_skill_level_written
    impact: >
      Outbound local attack packets do not write skill level even though the
      inbound foreign-attack parser expects one.
  - id: no_projectile_field_written
    impact: >
      Outbound local attack packets never write a projectile int, despite both
      the protocol markdown and inbound foreign-attack parser describing one.
  - id: charge_never_populated
    impact: Optional charge serialization path exists but is dead code.
  - id: meso_explosion_incomplete
    impact: >
      The packet writer special-cases skill 5221004 only by omitting a trailing
      4-byte zero block; it still does not write the per-target hit-count byte
      described by inbound parsing and protocol docs.
  - id: projectile_target_order_nondeterministic
    impact: >
      Target acquisition is sorted, but serialization order is lost when the
      result is stored in an unordered_map.
