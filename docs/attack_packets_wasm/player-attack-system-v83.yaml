entry_conditions:
  high_level_flow:
    - Combat::use_move(move_id) is called
    - Player must satisfy can_attack() when the move is an attack
    - Teleport skills are excluded and use USE_SKILL instead
    - Move object is resolved through Combat::get_move(move_id)
    - Player::can_use(move) must return FBR_NONE
    - If move.is_attack() is true, an AttackPacket is produced and dispatched
  player_can_attack_requirements:
    expression: "!attacking && !is_dead() && !is_climbing() && !is_sitting() && look.get_equips().has_weapon()"
  skill_can_use_requirements:
    general:
      - skill level must be > 0
      - skill level must be <= SkillData.masterlevel
      - current job must allow the skill via Job::can_use(skill_id)
      - current HP must be strictly greater than hpCon
      - current MP must be >= mpCon
      - if SkillData.required_weapon != NONE, current weapon must match
      - if current weapon uses ammo, current bullet count must be >= bulletConsume
    failure_codes:
      FBR_NONE: 0
      FBR_WEAPONTYPE: 1
      FBR_HPCOST: 2
      FBR_MPCOST: 3
      FBR_BULLETCOST: 4
      FBR_COOLDOWN: 5
      FBR_OTHER: 6
  regular_attack_can_use_requirements:
    ammo_weapons_require_ammo:
      weapons: [BOW, CROSSBOW, CLAW, GUN]
      rule: current bullet count must be > 0

