    levels:
      10:
        apTargets:
          STR: 35
          DEX: 25
          INT: 4
          LUK: 4
        spTargets: {}
        equipItemIds: [1002043, 1040015, 1060028, 1082003, 1432000]
        optimizeEquip: true
